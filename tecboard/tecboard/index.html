<!doctype html>
<html lang="PT-br">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description" content="Tecboard App - monitore suas aplicações em tempo real, para que elas nunca saiam do ar sem você saber">

        <link rel="stylesheet" href="styles/styles.css">
        <link rel="stylesheet" href="styles/header.css">
        <link rel="stylesheet" href="styles/main.css">
        <link rel="icon" href="favicon-tecboard-branco.svg">

        <title>Tecboard</title>
    </head>

    <body>
        <header class="cabecalho">
            <img class="cabecalho--logo" src="images/logo-tecboard-branco.png" alt="Logo tecboard">

            <input type="checkbox" id="darkmode" class="cabecalho--input">
            <label for="darkmode" class="input--label">
            </label>
        </header>

        <main class="conteudo">
            <h1 class="conteudo--titulo"><span class="titulo--destaque">Fique de olho<br></span> no que importa</h1>

            <p class="conteudo--texto">Monitoramento em tempo real com alertas inteligentes para sua aplicação nunca sair do ar sem você saber.</p>

            <a href="#" class="conteudo--botao" title="Teste a versão demo do App Tecboard">Testar Versão Demo</a>

            <picture class="conteudo--picture">
                <source media="(min-width:768px)" srcset="images/celulares-sobrepostos.png">
                <img class="picture--image" src="images/celulares-sobrepostos-mobile.png" alt="Dois celulares abertos no app da tecboard">
            </picture>

        </main>
    </body>
</html>
